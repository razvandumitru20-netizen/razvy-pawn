<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razvy Pawn - Preț Aur</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #012f23 0%, #001a13 100%);
            color: #e6c66a;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .wrap {
            max-width: 1500px;
            margin: 0 auto;
            padding: 25px 30px 40px;
            text-align: center;
        }

        .logo {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .logo img {
            width: 260px;
            max-width: 90%;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(230, 198, 106, 0.15);
        }

        .subtitle {
            font-size: 52px;
            color: #ffffff;
            margin: 18px 0 35px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .prices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: rgba(0, 0, 0, 0.22);
            border: 3px solid #d9b85f;
            border-radius: 28px;
            padding: 34px 20px;
            box-shadow: 0 0 24px rgba(217, 184, 95, 0.16);
        }

        .karat {
            font-size: 54px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .value {
            font-size: 78px;
            font-weight: 900;
            color: #f0c93d;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 32px;
            font-size: 28px;
            color: #e7e7e7;
        }

        @media (max-width: 1100px) {
            .subtitle {
                font-size: 38px;
            }

            .prices {
                grid-template-columns: 1fr;
            }

            .karat {
                font-size: 44px;
            }

            .value {
                font-size: 58px;
            }

            .logo img {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">
            <img src="/static/logo.png" alt="Razvy Pawn">
        </div>

        <div class="subtitle">PREȚ AUR AZI</div>

        <div class="prices">
            <div class="card">
                <div class="karat">24K</div>
                <div class="value" id="p24">...</div>
            </div>
            <div class="card">
                <div class="karat">18K</div>
                <div class="value" id="p18">...</div>
            </div>
            <div class="card">
                <div class="karat">14K</div>
                <div class="value" id="p14">...</div>
            </div>
            <div class="card">
                <div class="karat">8K</div>
                <div class="value" id="p8">...</div>
            </div>
        </div>

        <div class="footer">Actualizare automată la 10 minute</div>
    </div>

    <script>
        async function loadPrices() {
            const res = await fetch('/prices');
            const data = await res.json();

            document.getElementById('p24').innerText = data["24K"] + " RON";
            document.getElementById('p18').innerText = data["18K"] + " RON";
            document.getElementById('p14').innerText = data["14K"] + " RON";
            document.getElementById('p8').innerText = data["8K"] + " RON";
        }

        loadPrices();
        setInterval(loadPrices, 600000);
    </script>
</body>
</html>
